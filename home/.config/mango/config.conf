# Startup
exec-once=noctalia-shell

# Monitors
monitorrule=name:DP-2,width:2560,height:1440,refresh:165,x:0,y:0
monitorrule=name:HDMI-A-1,width:1920,height:1080,refresh:75,x:2560,y:280

bind=SUPER+ALT,p,toggle_monitor,HDMI-A-1

# Keyboard
xkb_rules_layout=us,ru
xkb_rules_options=grp:win_space_toggle

# Visual
gappih=0
gappiv=0
gappoh=0
gappov=2
borderpx=2
rootcolor=0x201b14ff
bordercolor=0x444444ff
focuscolor=0x8BAA9Bff
maximizescreencolor=0xBABD2Cff
urgentcolor=0xad401fff
scratchpadcolor=0xc4939dff
globalcolor=0x8d64cfff
overlaycolor=0x95C381ff

# Rules
windowrule=isfloating:1,width:1400,height:800,appid:xdg-desktop-portal

# Volume and Brightness keys
bind=none,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1+ -l 1.0
bind=none,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_AUDIO_SINK@ 0.1-
bind=none,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind=none,XF86AudioMicMute,spawn,wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bind=none,XF86AudioPlay,spawn,playerctl play-pause
bind=none,XF86AudioStop,spawn,playerctl stop
bind=none,XF86AudioPrev,spawn,playerctl previous
bind=none,XF86AudioNext,spawn,playerctl next

bind=none,XF86MonBrightnessUp,spawn,brightnessctl --class=backlight set +10%
bind=none,XF86MonBrightnessDown,spawn,brightnessctl --class=backlight set 10%-

# Mod+Return to open terminal
bind=SUPER,Return,spawn,alacritty
bind=SUPER,R,reload_config
bind=SUPER,D,spawn,noctalia-shell ipc call launcher toggle
bind=SUPER,E,spawn,nautilus
bind=SUPER+SHIFT+CTRL,Q,killclient
bind=CTRL+ALT,delete,spawn,noctalia-shell ipc call sessionMenu toggle

# switch window status
# bind=SUPER,g,toggleglobal,
bind=SUPER,tab,toggleoverview
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+SHIFT,f,togglefullscreen,
bind=SUPER,o,toggleoverlay,

# Scratchpad
bind=SUPER,i,minimized
# bind=SUPER+SHIFT,i,restore_minimized
bind=SUPER,z,toggle_scratchpad
bind=SUPER,v,togglefloating, # can restore minimazed from scratchpad

# Focus window right/left
bind=SUPER,H,focusdir,left
bind=SUPER,J,focusdir,down
bind=SUPER,K,focusdir,up
bind=SUPER,L,focusdir,right

# Swap window right/left
bind=SUPER+CTRL,H,exchange_client,left
bind=SUPER+CTRL,J,exchange_client,down
bind=SUPER+CTRL,K,exchange_client,up
bind=SUPER+CTRL,L,exchange_client,right

# monitor switch
bind=SUPER,bracketleft,focusmon,left
bind=SUPER,bracketright,focusmon,right
bind=SUPER+CTRL,bracketleft,tagmon,left
bind=SUPER+CTRL,bracketright,tagmon,right

# switch layout
bind=SUPER,n,switch_layout

# Focus view
bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# Swap view
bind=SUPER+CTRL,1,tag,1,0
bind=SUPER+CTRL,2,tag,2,0
bind=SUPER+CTRL,3,tag,3,0
bind=SUPER+CTRL,4,tag,4,0
bind=SUPER+CTRL,5,tag,5,0
bind=SUPER+CTRL,6,tag,6,0
bind=SUPER+CTRL,7,tag,7,0
bind=SUPER+CTRL,8,tag,8,0
bind=SUPER+CTRL,9,tag,9,0

# Window manipulation
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

# Focus next/prev view
axisbind=SUPER,UP,viewtoleft
axisbind=SUPER,DOWN,viewtoright
mousebind=SUPER,btn_side,viewtoleft
mousebind=SUPER,btn_extra,viewtoright
bind=SUPER,minus,viewtoleft
bind=SUPER,equal,viewtoright

# Overview Setting
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
xwayland_persistence=1
syncobj_enable=0
no_border_when_single=0
axis_bind_apply_timeout=100
focus_on_activate=1
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
circle_layout=tile,scroller
enable_floating_snap=1
snap_distance=50
drag_tile_to_tile=1
single_scratchpad=1
scratchpad_cross_monitor=1

# Animation Configuration
animations=1
layer_animations=1
animation_type_open=slide
animation_type_close=slide 
layer_animation_type_open=slide
layer_animation_type_close=slide 
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=1
zoom_initial_ratio=0.4
zoom_end_ratio=0.7
fadein_begin_opacity=0.8
fadeout_begin_opacity=0.8
animation_duration_move=500
animation_duration_open=400
animation_duration_tag=350
animation_duration_close=800
animation_duration_focus=400
animation_curve_open=0.46,1.0,0.29,1.1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.58,0.98,0.58,0.98
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=0
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=0
scroller_ignore_proportion_single=0
scroller_default_proportion_single=1.0
scroller_proportion_preset=0.5,0.8

# Tile
new_is_master=0
default_mfact=0.55
default_nmaster=1
